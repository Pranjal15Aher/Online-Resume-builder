<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    display: flex;
    height: 100vh;
}

/* Left Form */
.form-section {
    width: 40%;
    padding: 20px;
    background: #f4f4f4;
    overflow-y: auto;
}

.form-section h2 {
    text-align: center;
}

input, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 8px;
}

/* Resume Preview */
.preview {
    width: 60%;
    padding: 20px;
    background: white;
}

.resume {
    border: 1px solid #ccc;
    padding: 20px;
}

.resume h1 {
    margin-bottom: 5px;
}

.section {
    margin-top: 15px;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- Form Section -->
<div class="form-section">
    <h2>Resume Builder</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="title" placeholder="Job Title">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">

    <textarea id="summary" placeholder="Profile Summary"></textarea>
    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <textarea id="education" placeholder="Education"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>

    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="downloadPDF()">Download Resume</button>
</div>

<!-- Preview Section -->
<div class="preview">
    <div class="resume" id="resume">

        <h1 id="r_name">Your Name</h1>
        <p id="r_title">Your Job Title</p>
        <p id="r_contact"></p>

        <div class="section">
            <h3>Summary</h3>
            <p id="r_summary"></p>
        </div>

        <div class="section">
            <h3>Skills</h3>
            <p id="r_skills"></p>
        </div>

        <div class="section">
            <h3>Education</h3>
            <p id="r_education"></p>
        </div>

        <div class="section">
            <h3>Experience</h3>
            <p id="r_experience"></p>
        </div>

    </div>
</div>

<script>
function generateResume() {
    document.getElementById("r_name").innerText = document.getElementById("name").value;
    document.getElementById("r_title").innerText = document.getElementById("title").value;

    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    document.getElementById("r_contact").innerText = email + " | " + phone;

    document.getElementById("r_summary").innerText = document.getElementById("summary").value;

    let skills = document.getElementById("skills").value.split(",");
    document.getElementById("r_skills").innerText = skills.join(", ");

    document.getElementById("r_education").innerText = document.getElementById("education").value;
    document.getElementById("r_experience").innerText = document.getElementById("experience").value;
}

function downloadPDF() {
    let printContent = document.getElementById("resume").innerHTML;
    let newWindow = window.open("", "", "width=800,height=600");
    newWindow.document.write(printContent);
    newWindow.print();
}
</script>

</body>
</html>
